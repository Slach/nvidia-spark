services:
  max-inference:
    image: modular/max-nvidia-full:latest
    volumes:
      - ${HOME}/.cache/huggingface:/root/.cache/huggingface:rw
      - ${HOME}/.cache/max_cache:/opt/venv/share/max/.max_cache:rw
    command:
      - --port
      - "8100"
      - --model
      - Qwen/Qwen3-Coder-30B-A3B-Instruct-FP8
      - --trust-remote-code
    ports:
      - "127.0.0.1:8100:8100"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    networks:
      - spark-network
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8100/health" ]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 10s

  sglang:
    image: lmsysorg/sglang:dev-cu13
    volumes:
      - ${HOME}/.cache/huggingface:/models/huggingface:ro
    shm_size: '32gb' 
    networks:
      - spark-network
    environment:
      - HF_HOME=/models/huggingface
      - HF_HUB_OFFLINE=1
      - HF_TOKEN=${HF_TOKEN:-}
    ports:
      - "127.0.0.1:30000:30000"
    command: >
      sglang serve
      --port 30000 
      --host 0.0.0.0
      --model-path ${SGLANG_MODEL:-Qwen/Qwen3.5-27B-FP8} 
      --context-length 261375
      --kv-cache-dtype fp8_e4m3 
      --tp 1 
      --reasoning-parser qwen3
      --tool-call-parser qwen3_coder
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
  vllm:
    # look build-vllm-cuda13-docker.sh
    image: vllm:spark-full
    build: 
      context: .
      dockerfile: Dockerfile.vllm.spark
    # image: vllm/vllm-openai:cu130-nightly-aarch64
    volumes:
      - ${HOME}/.cache/huggingface:/models/huggingface
    #  - ./docker/safetensors_coding_generation.json:/models/huggingface/hub/models--AxionML--Qwen3.5-35B-A3B-NVFP4/snapshots/75f5a9d934e5528d372916d8df7376ec52f6801a/generation_config.json:ro
    environment:
      - HF_HOME=/models/huggingface
      - HF_HUB_OFFLINE=1
      - HF_TOKEN=${HF_TOKEN:-}
    ports:
      - "127.0.0.1:30001:30001"
    networks:
      - spark-network
    command: >
      ${VLLM_MODEL:-Qwen/Qwen3.5-35B-A3B-FP8}
      --host 0.0.0.0
      --port 30001      
      --max-model-len 261375
      --max-num-batched-tokens 8192
      --enable-chunked-prefill
      --max-num-seqs 2
      --kv-cache-dtype fp8
      --calculate-kv-scales
      --trust-remote-code
      --enable-prefix-caching 
      --enable-expert-parallel 
      --enable-auto-tool-choice 
      --tool-call-parser qwen3_coder 
      --reasoning-parser qwen3
#      --load-format fastsafetensors 
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]

  paroquant:
    image: ghcr.io/z-lab/paroquant:serve
    ports:
      - "127.0.0.1:30002:30002"
    volumes:
      - ${HOME}/.cache/paroquant:/root/.cache/paroquant
      - ${HOME}/.cache/huggingface:/models/huggingface:ro
    environment:
      - HF_HOME=/models/huggingface
      - HF_HUB_OFFLINE=1
      - HF_TOKEN=${HF_TOKEN:-}
      - HF_HUB_CACHE=/models/huggingface    
      - HUGGINGFACE_HUB_CACHE=/models/huggingface
      - VLLM_CACHE_ROOT=/models/huggingface      
    command: >
      ${PAROQUANT_MODEL:-z-lab/gemma-4-31B-it-PARO}
      --download-dir /models/huggingface
      --host 0.0.0.0
      --port 30002      
      --max-model-len 261375
      --max-num-batched-tokens 8192
      --enable-chunked-prefill
      --max-num-seqs 2
      --kv-cache-dtype fp8
      --calculate-kv-scales
      --trust-remote-code
      --enable-prefix-caching 
      --enable-expert-parallel 
#      --enable-auto-tool-choice 
#      --tool-call-parser gemma 
#      --reasoning-parser gemma

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]

  llama.cpp:
    build:
      context: .
      dockerfile: Dockerfile.llama.cpp.spark
    image: "llama.cpp:spark-full"
    volumes:
      - ${HOME}/.cache/huggingface:/models/huggingface:ro
      - ./llama.cpp.models.ini:/etc/llama.cpp/config.ini
    entrypoint: /app/llama-server
    command:
      - --models-max
      - "1"
      - --models-preset
      - /etc/llama.cpp/config.ini
      - --host
      - 0.0.0.0
      - --port
      - "8090"
      - "--metrics"
    ports:
      - "127.0.0.1:8090:8090"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    networks:
      - spark-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8090/health" ]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 10s

  vibe-kanban:
    build:
      context: .
      dockerfile: Dockerfile.vibe-kanban
    image: vibe-kanban:spark
    volumes:
      - ${HOME}:/root/
      - /tmp:/tmp
    ports:
      - "127.0.0.1:${VIBE_KANBAN_PORT:-8888}:${VIBE_KANBAN_PORT:-8888}"
    networks:
      - spark-network
    environment:
      - HOME=/root
      - AGENT_INFERENCE_SERVER=${AGENT_INFERENCE_SERVER:-max-inference}
      - AGENT_MAIN_MODEL=${AGENT_MAIN_MODEL:-noctrex/MiniMax-M2-REAP-139B-A10B-MXFP4_MOE-GGUF}
      - AGENT_BACKGROUND_MODEL=${AGENT_BACKGROUND_MODEL:-noctrex/MiniMax-M2-REAP-139B-A10B-MXFP4_MOE-GGUF}
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8888/health" ]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 10s

  seer-marketing:
    image: ghcr.io/mx-seer/seer:latest
    volumes:
      - ./docker/seer-config.yml:/app/config.yaml
    ports:
      - "127.0.0.1:${SEER_PORT:-8889}:${SEER_PORT:-8889}"
    networks:
      - spark-network
  
  aider-desk:
    image: ghcr.io/hotovo/aider-desk:latest
    ports:
    - "127.0.0.1:${AIDER_DESK_PORT:-24337}:${AIDER_DESK_PORT:-24337}"
    volumes:
    - aider-desk-data:/app/data/
    - ${HOME}/src/:/src/ 
    - ${HOME}/.aider-desk/:/root/.aider-desk/
    networks:
      - spark-network

  b4:
    image: lavrushin/b4:latest
    container_name: b4
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_MODULE
    volumes:
      - ./docker/b4:/etc/b4
    command: ["--config", "/etc/b4/b4.json"]
    restart: unless-stopped
# docker network create spark-network
networks:
  spark-network:
    external: true

volumes:
  aider-desk-data: