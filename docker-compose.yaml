services:
  max-inference:
    image: modular/max-nvidia-full:latest
    volumes:
      - ${HOME}/.cache/huggingface:/root/.cache/huggingface:rw
      - ${HOME}/.cache/max_cache:/opt/venv/share/max/.max_cache:rw
    command:
      - --port
      - "8100"
      - --model
      - Qwen/Qwen3-Coder-30B-A3B-Instruct-FP8
      - --trust-remote-code
    ports:
      - "127.0.0.1:8100:8100"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    networks:
      - spark-network
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8100/health" ]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 10s

  sglang:
    image: lmsysorg/sglang:dev-cu13
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:30000/health" ]
      interval: 60s
      timeout: 10s
      retries: 5
      start_period: 180s
    volumes:
      - ${HOME}/.cache/huggingface:/models/huggingface:ro
    shm_size: '32gb' 
    networks:
      - spark-network
    environment:
      - HF_HOME=/models/huggingface
      - HF_HUB_OFFLINE=1
      - HF_TOKEN=${HF_TOKEN:-}
    ports:
      - "127.0.0.1:30000:30000"
    command: >
      sglang serve
      --port 30000 
      --host 0.0.0.0
      --model-path ${SGLANG_MODEL:-Qwen/Qwen3.5-27B-FP8} 
      --context-length 261375
      --kv-cache-dtype fp8_e4m3 
      --tp 1 
      --reasoning-parser qwen3
      --tool-call-parser qwen3_coder
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
  vllm:
    image: vllm/vllm-openai:cu130-nightly-aarch64
    # look build-vllm-cuda13-docker.sh
    # image: vllm:spark-full
    # build: 
    #  context: .
    #  dockerfile: Dockerfile.vllm.spark
    # image: ghcr.io/aeon-7/vllm-aeon-ultimate-dflash:qwen36-v3
    volumes:
      - ${HOME}/.cache/huggingface:/models/huggingface
    #  - ./docker/chat-template-qwen3.jinja:/etc/vllm/chat-template.jinja:ro
    #  - ./docker/safetensors_coding_generation.json:/models/huggingface/hub/models--AxionML--Qwen3.5-35B-A3B-NVFP4/snapshots/75f5a9d934e5528d372916d8df7376ec52f6801a/generation_config.json:ro
    environment:
      - HF_HOME=/models/huggingface
      - HF_HUB_OFFLINE=1
      - HF_TOKEN=${HF_TOKEN:-}
      # ─── Core vLLM ───
      - VLLM_ALLOW_LONG_MAX_MODEL_LEN=1

      # ─── GB10 / sm_121a runtime ───
      - TORCH_CUDA_ARCH_LIST=12.1a
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      - TORCH_MATMUL_PRECISION=high
      - NVIDIA_FORWARD_COMPAT=1
      - NVIDIA_DISABLE_REQUIRE=1

      # Required by PR https://github.com/vllm-project/vllm/pull/40191 for sm_121a-only builds — without this,
      # vllm._C_stable_libtorch.abi3.so fails to import.
      - ENABLE_NVFP4_SM100=0

      # ─── FP4 path selection ───
      - VLLM_USE_FLASHINFER_MOE_FP4=0
      - VLLM_TEST_FORCE_FP8_MARLIN=0
      - VLLM_USE_FLASHINFER_SAMPLER=1
      # XS-specific: explicitly select the patched CUTLASS NVFP4 GEMM backend.
      # This is a no-op on the v2.1 image (already the default) but makes the path
      # selection unambiguous.
      - VLLM_NVFP4_GEMM_BACKEND=flashinfer-cutlass
    ports:
      - "127.0.0.1:30001:30001"
    # vLLM start really slow =(
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:30001/health" ]
      interval: 30s
      timeout: 10s
      retries: 100
      start_period: 600s
    networks:
      - spark-network
    command: >
      ${VLLM_MODEL:-Qwen/Qwen3.6-35B-A3B-FP8}
      --host 0.0.0.0
      --port 30001      
      --max-model-len 262144
      --max-num-batched-tokens 32768
      --enable-chunked-prefill
      --max-num-seqs 3
      --trust-remote-code
      --quantization modelopt
      --dtype auto
      --gpu-memory-utilization 0.85
      --enable-prefix-caching 
      --enable-auto-tool-choice 
      --load-format safetensors 
      --mm-encoder-tp-mode data 
      --mm-processor-cache-type shm
      --tool-call-parser gemma4
      --reasoning-parser gemma4
#      --tool-call-parser qwen3_coder 
#      --reasoning-parser qwen3
#      --limit-mm-per-prompt '{"image": 4, "video": 2}' 
#      --attention-backend flash_attn 
#      --speculative-config '{"method":"dflash","model":"z-lab/Qwen3.6-27B-DFlash","num_speculative_tokens":15}'
#      --speculative-config '{"method": "dflash", "model": "z-lab/Qwen3.6-35B-A3B-DFlash", "num_speculative_tokens": 15 }'
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]

  paroquant:
    # image: ghcr.io/z-lab/paroquant:serve
    image: paroquant:spark-full
    build:
      context: .
      dockerfile: Dockerfile.paroquant.spark
    ports:
      - "127.0.0.1:30002:30002"
    volumes:
      - ${HOME}/.cache/huggingface:/models/huggingface
    environment:
      - HF_HOME=/models/huggingface
      - HF_TOKEN=${HF_TOKEN:-}
      - HF_HUB_OFFLINE=1
      - TRANSFORMERS_OFFLINE=1
      - VLLM_CACHE_ROOT=/models/huggingface
      - VLLM_WORKER_MULTIPROC_METHOD=spawn
    entrypoint:
      - /bin/bash
      - -xc
    command: >
      "
      python3 -m paroquant.cli.serve
      --model ${PAROQUANT_MODEL:-z-lab/Qwen3.6-27B-PARO}
      --host 0.0.0.0
      --port 30002
      --max-model-len 261375
      --max-num-batched-tokens 8192
      --enable-chunked-prefill
      --max-num-seqs 2
      --kv-cache-dtype fp8
      --gpu-memory-utilization 0.72
      --trust-remote-code
      --enable-prefix-caching
      --enable-auto-tool-choice
      --tool-call-parser gemma4
      --reasoning-parser gemma4
      "

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
  atlas:
    image: avarok/atlas-gb10:latest
    ipc: host
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    environment:
      - RUST_LOG=info
    command: >
      serve ${ATLAS_MODEL:-Qwen/Qwen3.6-35B-A3B-FP8}
      --bind 0.0.0.0
      --port 30003 
      --max-seq-len 261375 
      --max-batch-size 4
      --kv-cache-dtype ${ATLAS_KV_CACHE_TYPE:-fp8}
      --kv-high-precision-layers auto
      --gpu-memory-utilization ${ATLAS_MEMORY_USAGE:-0.9}
      --scheduling-policy slai
      --enable-prefix-caching
      --max-prefill-tokens 8192
      --speculative
      --num-drafts 2
      --tool-call-parser qwen3_coder
    ports:
      - "127.0.0.1:30003:30003"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    networks:
      - spark-network
    healthcheck:
      test: ['CMD', 'bash', '-c', 'exec 3<>/dev/tcp/localhost/30003; printf "GET /health HTTP/1.0\r\n\r\n" >&3; read -r _ code _ <&3; [ "$$code" = 200 ]']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
  llama.cpp:
    build:
      context: .
      dockerfile: Dockerfile.llama.cpp.spark
    image: "llama.cpp:spark-full"
    # image: ghcr.io/ggml-org/llama.cpp:full-cuda13
    volumes:
      - ${HOME}/.cache/huggingface:/models/huggingface:ro
      - ./llama.cpp.models.ini:/etc/llama.cpp/config.ini
    entrypoint: /app/llama-server
    command:
      - --models-max
      - "1"
      - --models-preset
      - /etc/llama.cpp/config.ini
      - --host
      - 0.0.0.0
      - --port
      - "8090"
      - "--metrics"
    ports:
      - "127.0.0.1:8090:8090"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    networks:
      - spark-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8090/health" ]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 10s

  vibe-kanban:
    build:
      context: .
      dockerfile: Dockerfile.vibe-kanban
    image: vibe-kanban:spark
    volumes:
      - ${HOME}:/root/
      - /tmp:/tmp
    ports:
      - "127.0.0.1:${VIBE_KANBAN_PORT:-8888}:${VIBE_KANBAN_PORT:-8888}"
    networks:
      - spark-network
    environment:
      - HOME=/root
      - AGENT_INFERENCE_SERVER=${AGENT_INFERENCE_SERVER:-max-inference}
      - AGENT_MAIN_MODEL=${AGENT_MAIN_MODEL:-noctrex/MiniMax-M2-REAP-139B-A10B-MXFP4_MOE-GGUF}
      - AGENT_BACKGROUND_MODEL=${AGENT_BACKGROUND_MODEL:-noctrex/MiniMax-M2-REAP-139B-A10B-MXFP4_MOE-GGUF}
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8888/health" ]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 10s

  seer-marketing:
    image: ghcr.io/mx-seer/seer:latest
    volumes:
      - ./docker/seer-config.yml:/app/config.yaml
    ports:
      - "127.0.0.1:${SEER_PORT:-8889}:${SEER_PORT:-8889}"
    networks:
      - spark-network
  
  aider-desk:
    image: ghcr.io/hotovo/aider-desk:latest
    ports:
    - "127.0.0.1:${AIDER_DESK_PORT:-24337}:${AIDER_DESK_PORT:-24337}"
    volumes:
    - aider-desk-data:/app/data/
    - ${HOME}/src/:/src/ 
    - ${HOME}/.aider-desk/:/root/.aider-desk/
    networks:
      - spark-network

  b4:
    image: lavrushin/b4:latest
    container_name: b4
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_MODULE
    volumes:
      - ./docker/b4:/etc/b4
    command: ["--config", "/etc/b4/b4.json"]
    restart: unless-stopped
# docker network create spark-network
networks:
  spark-network:
    external: true

volumes:
  aider-desk-data: